<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeTutor AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #667eea; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        textarea { width: 100%; min-height: 150px; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-family: monospace; margin-bottom: 15px; }
        button { background: #667eea; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; }
        button:disabled { background: #ccc; }
        .output { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-top: 20px; display: none; white-space: pre-wrap; }
        .output.show { display: block; }
        .badge { background: #667eea; color: white; padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 10px; }
        .loading { color: #667eea; text-align: center; }
        .checkbox-container { margin-bottom: 15px; }
    </style> 
</head>
<body>
    <div class="container">
        <h1>🚀 CodeTutor AI</h1>
        <p class="subtitle">Your 24/7 Personal Coding Mentor</p>
        
        <textarea id="userInput" placeholder="Paste your code, error, or question below..."></textarea>
        
        <div class="checkbox-container">
            <input type="checkbox" id="beginnerMode" checked>
            <label for="beginnerMode">🎓 Beginner Mode (Simplified explanations)</label>
        </div>
        
        <button id="submitBtn" onclick="askCodeTutor()">Ask CodeTutor</button>
        
        <div id="outputSection" class="output">
            <span id="categoryBadge" class="badge" style="display: none;">Category</span>
            <div id="loading" class="loading" style="display: none;">🤔 CodeTutor is thinking...</div>
            <div id="response"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://c80uujw55j.execute-api.us-east-1.amazonaws.com/dev/analyze';

        async function askCodeTutor() {
            const input = document.getElementById('userInput').value;
            const beginnerMode = document.getElementById('beginnerMode').checked;
            const outputSection = document.getElementById('outputSection');
            const loading = document.getElementById('loading');
            const responseDiv = document.getElementById('response');
            const categoryBadge = document.getElementById('categoryBadge');
            const submitBtn = document.getElementById('submitBtn');

            if (!input.trim()) {
                alert('Please enter some text first!');
                return;
            }

            outputSection.classList.add('show');
            loading.style.display = 'block';
            responseDiv.textContent = '';
            categoryBadge.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Thinking...';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input: input, beginnerMode: beginnerMode })
                });

                loading.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Ask CodeTutor';

                const data = await res.json();

                if (res.ok) {
                    categoryBadge.style.display = 'inline-block';
                    categoryBadge.textContent = 'Response';
                    responseDiv.textContent = data.response || JSON.stringify(data, null, 2);
                } else {
                    categoryBadge.style.display = 'inline-block';
                    categoryBadge.textContent = 'Error';
                    responseDiv.textContent = 'Error: ' + (data.error || 'Something went wrong');
                }
            } catch (error) {
                loading.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Ask CodeTutor';
                categoryBadge.style.display = 'inline-block';
                categoryBadge.textContent = 'Network Error';
                responseDiv.textContent = 'Failed to connect: ' + error.message;
                console.error('API Error:', error);
            }
        }
    </script>
</body>
</html>
